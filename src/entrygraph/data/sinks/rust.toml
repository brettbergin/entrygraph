# Built-in Rust sink/source catalog.
# Patterns are brace-globs matched against canonical callee qnames. Rust qnames
# normalize `::` -> `.`, so:
#   import-expanded external calls -> "rs:std.process.Command.new"
#   unresolved method calls        -> "rs:*.Command.new"
#   macro invocations              -> "rs:sqlx.query" (the trailing `!` is stripped)
# `use std::fs` binds `fs`, so file sinks list both `std.fs.*` and `fs.*` aliases.

[[sink]]
id = "rust.command-exec"
category = "command_exec"
severity = "high"
callee = "rs:{std.process.Command.new,Command.new,*.Command.new}"
description = "Subprocess construction via std::process::Command (sink on the builder, not spawn/output)"

[[sink]]
id = "rust.sql-query"
category = "sql"
severity = "medium"
callee = "rs:{sqlx.query,sqlx.query_as,sqlx.query_scalar,sqlx.raw_sql,diesel.sql_query,*.sql_query}"
description = "SQL execution (matches both fn calls and sqlx!/diesel! macros after `!`-stripping)"

[[sink]]
id = "rust.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "rs:std.fs.{write,read,read_to_string,remove_file,remove_dir_all,copy,rename}"
description = "Filesystem access via std::fs (verify the path is not attacker-controlled)"

[[sink]]
id = "rust.file-alias"
category = "path_traversal"
severity = "medium"
callee = "rs:fs.{write,read,read_to_string,remove_file}"
description = "Filesystem access via a `use std::fs` alias"

[[sink]]
id = "rust.ssrf"
category = "ssrf"
severity = "low"
callee = "rs:{reqwest.get,reqwest.blocking.get}"
description = "Outbound HTTP request via reqwest"

[[sink]]
id = "rust.dynamic-load"
category = "dynamic_load"
severity = "medium"
callee = "rs:{libloading.Library.new,*.Library.new}"
description = "Dynamic library / shared object load via libloading"

[[sink]]
id = "rust.deserialization"
category = "deserialization"
severity = "medium"
callee = "rs:{bincode.deserialize,serde_yaml.from_str}"
description = "Deserialization of untrusted input"

# --- coverage lift to `full` tier (#135) ---
# tokio::process::Command::new is already caught by the `*.Command.new` glob on
# rust.command-exec; the new entries below add genuinely-uncovered surface.
[[sink]]
id = "rust.path-traversal.tokio"
category = "path_traversal"
severity = "medium"
callee = "rs:tokio.fs.{read,read_to_string,write,remove_file,remove_dir_all,copy,rename}"
description = "Async filesystem access via tokio::fs (verify the path is not attacker-controlled)"

[[sink]]
id = "rust.file-write"
category = "file_write"
severity = "low"
callee = "rs:{std.fs.{File.create,OpenOptions.new,create_dir,create_dir_all},fs.{File.create,OpenOptions.new,create_dir,create_dir_all},File.create,OpenOptions.new}"
description = "Filesystem mutation (create/open-for-write via std::fs)"

[[sink]]
id = "rust.network-out"
category = "network_out"
severity = "low"
callee = "rs:{reqwest.Client.{get,post,put,patch,delete,request},reqwest.blocking.Client.{get,post,request},ureq.{get,post,put,delete,request}}"
description = "Outbound HTTP request (reqwest client / ureq)"

[[sink]]
id = "rust.sql-raw"
category = "sql"
severity = "medium"
# receiver-agnostic DB driver calls (rusqlite/postgres/tokio-postgres/mysql) —
# gated on a dynamic-argument hint so a constant/parameterized query is not
# flagged, mirroring the Go SQL sink.
callee = "rs:*.{execute,execute_batch,batch_execute,query,query_one,query_opt,query_raw}"
require_arg_hint = "format!|\\+|push_str"
description = "Raw SQL execution with a dynamically-built query (rusqlite/postgres/mysql)"

[[sink]]
id = "rust.deserialization.msgpack"
category = "deserialization"
severity = "medium"
callee = "rs:{rmp_serde.{from_slice,from_read},serde_cbor.{from_slice,from_reader},serde_pickle.from_slice}"
description = "Deserialization of untrusted input (msgpack/cbor/pickle)"

[[source]]
id = "rust.env"
category = "env_input"
callee = "rs:{std.env.var,env.var}"
description = "Environment variable input"

# argv is operator-controlled input, distinct from env vars (#86)
[[source]]
id = "rust.cli-args"
category = "cli_arg"
callee = "rs:{std.env.args,env.args,std.env.args_os,env.args_os}"
description = "Process argument input (std::env::args)"

[[source]]
id = "rust.clap.matches"
category = "cli_arg"
callee = "rs:*.{value_of,values_of,get_one,get_many}"
description = "clap parsed-argument access"

[[source]]
id = "rust.stdin"
category = "stdin_input"
callee = "rs:{std.io.stdin,io.stdin}"
description = "Standard input"

# ---------------- sanitizers ----------------

[[sanitizer]]
id = "rs.sanitize.shell-escape"
category = "command_exec"
callee = "rs:{shell_escape.escape,shell_escape.unix.escape,shlex.quote,shlex.try_quote}"
effect = "neutralizes"
description = "Shell argument quoting (shell-escape / shlex crates)"

[[sanitizer]]
id = "rs.sanitize.path-filename"
category = "path_traversal"
callee = "rs:*.{file_name,canonicalize}"
effect = "reduces"
description = "Path::file_name / canonicalize"
