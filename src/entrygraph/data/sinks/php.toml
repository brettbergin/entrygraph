# Built-in PHP sink/source catalog.
# Patterns are brace-globs matched against canonical callee qnames:
#   resolved external calls    -> "php:App.Services.Runner.run"
#   unresolved receiver calls  -> "php:*.query"
#   unresolved bare calls      -> "php:shell_exec"
#
# Namespace separators (`\`) are normalized to `.` upstream, so globs are
# dot-based. NOTE: `$_GET` / `$_POST` / `$_REQUEST` / `$_COOKIE` superglobals
# are *variable reads*, not function calls, so they never surface as call
# references and cannot be modeled as sources here — taint from them must be
# tracked structurally, which is out of scope for this catalog.

[[sink]]
id = "php.command-exec"
category = "command_exec"
severity = "high"
callee = "php:{exec,system,shell_exec,passthru,popen,proc_open,pcntl_exec}"
description = "OS command execution"

[[sink]]
id = "php.code-eval"
category = "code_eval"
severity = "critical"
callee = "php:{eval,assert,create_function}"
description = "Dynamic code evaluation"

[[sink]]
id = "php.code-eval.callback"
category = "code_eval"
severity = "critical"
callee = "php:{call_user_func,call_user_func_array}"
require_arg_hint = "\\$"
description = "Dynamic callback invocation with a non-literal callable"

[[sink]]
id = "php.code-inclusion"
category = "code_inclusion"
severity = "critical"
callee = "php:{include,include_once,require,require_once}"
require_arg_hint = "\\$"
description = "Dynamic file inclusion with a non-literal path"

[[sink]]
id = "php.deserialization"
category = "deserialization"
severity = "high"
callee = "php:unserialize"
description = "Unsafe deserialization"

[[sink]]
id = "php.sql"
category = "sql"
severity = "high"
callee = "php:{mysqli_query,mysqli_multi_query,pg_query,sqlite_query}"
description = "SQL statement execution"

# `.query`/`.exec`/`.prepare` on a fully-literal SQL string is the safe idiom
# (constant statement, bound params); a `$` in the argument means a variable is
# involved — interpolated into the string or concatenated — which is the actual
# injection surface (#97).
[[sink]]
id = "php.sql.pdo-query"
category = "sql"
severity = "high"
callee = "php:*.{query,exec}"
require_arg_hint = "\\$"
description = "PDO/DB query execution with a variable in the statement"

[[sink]]
id = "php.sql.pdo-prepare"
category = "sql"
severity = "low"
callee = "php:*.prepare"
require_arg_hint = "\\$"
description = "PDO prepared statement built with a variable"

[[sink]]
id = "php.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "php:{file_get_contents,file_put_contents,fopen,readfile,unlink}"
require_arg_hint = "\\$"
description = "Filesystem access with a non-literal path"

[[sink]]
id = "php.ssrf"
category = "ssrf"
severity = "medium"
callee = "php:{curl_exec,curl_init,fsockopen}"
description = "Server-side request"

[[sink]]
id = "php.template-injection"
category = "template_injection"
severity = "high"
callee = "php:*.render"
require_arg_hint = "\\$"
description = "Template rendering with non-literal input (receiver-agnostic)"

[[sink]]
id = "php.ldap"
category = "ldap"
severity = "medium"
callee = "php:{ldap_search,ldap_bind}"
description = "LDAP operation"

[[sink]]
id = "php.xxe"
category = "xxe"
severity = "medium"
callee = "php:{simplexml_load_string,simplexml_load_file}"
description = "XML parsing susceptible to XXE"

[[sink]]
id = "php.weak-crypto"
category = "weak_crypto"
severity = "low"
callee = "php:{md5,sha1,mt_rand,rand}"
description = "Weak hashing / insecure randomness"

# PHP superglobals — subscript reads ($_GET["x"]) synthesized by the extractor (#87C)
[[source]]
id = "php.superglobal.get"
category = "http_input"
channel = "query"
callee = "php:$_GET"
description = "$_GET query input"

[[source]]
id = "php.superglobal.post"
category = "http_input"
channel = "form"
callee = "php:$_POST"
description = "$_POST form input"

[[source]]
id = "php.superglobal.request"
category = "http_input"
channel = "body"
callee = "php:$_REQUEST"
description = "$_REQUEST input"

[[source]]
id = "php.superglobal.cookie"
category = "http_input"
channel = "cookie"
callee = "php:$_COOKIE"
description = "$_COOKIE input"

[[source]]
id = "php.console.input"
category = "cli_arg"
callee = "php:*.{getArgument,getOption}"
description = "Symfony Console argument/option access"

[[source]]
id = "php.filter-input"
category = "http_input"
callee = "php:{filter_input,filter_input_array}"
description = "Filtered request input"

# split by channel (#87)
[[source]]
id = "php.request.body"
category = "http_input"
channel = "body"
callee = "php:*.input"
description = "Laravel request input (body/query merge)"

[[source]]
id = "php.request.query"
category = "http_input"
channel = "query"
callee = "php:*.query"
description = "Laravel/Symfony query input"

[[source]]
id = "php.request.form"
category = "http_input"
channel = "form"
callee = "php:*.post"
description = "Laravel/Symfony post-form input"

[[source]]
id = "php.request.cookie"
category = "http_input"
channel = "cookie"
callee = "php:*.cookie"
description = "Laravel/Symfony cookie input"

[[source]]
id = "php.request.header"
category = "http_input"
channel = "header"
callee = "php:*.header"
description = "Laravel/Symfony header input"

# ---------------- sanitizers ----------------

[[sanitizer]]
id = "php.sanitize.escapeshell"
category = "command_exec"
callee = "php:{escapeshellarg,escapeshellcmd}"
effect = "neutralizes"
description = "Shell argument/command escaping"

[[sanitizer]]
id = "php.sanitize.htmlspecialchars"
category = "template_injection"
callee = "php:{htmlspecialchars,htmlentities,strip_tags}"
effect = "reduces"
description = "HTML escaping"

[[sanitizer]]
id = "php.sanitize.sql-escape"
category = "sql"
callee = "php:{mysqli_real_escape_string,pg_escape_string,pg_escape_literal}"
effect = "reduces"
description = "SQL string escaping"

[[sanitizer]]
id = "php.sanitize.sql-quote"
category = "sql"
callee = "php:*.{quote,real_escape_string}"
effect = "reduces"
description = "PDO::quote / mysqli::real_escape_string"

[[sanitizer]]
id = "php.sanitize.intval"
category = "sql"
callee = "php:{intval,floatval}"
effect = "neutralizes"
description = "Numeric cast — a parsed number cannot carry SQL injection"

[[sanitizer]]
id = "php.sanitize.basename"
category = "path_traversal"
callee = "php:{basename,realpath}"
effect = "reduces"
description = "Basename / realpath resolution"
