# Built-in Ruby sink/source catalog.
# Patterns are brace-globs matched against canonical callee qnames:
#   unresolved bare calls      -> "rb:system"
#   unresolved attribute calls -> "rb:*.execute"
#   fuzzy/import project calls  -> the project qname (not matched here)

# A fully-constant command (string literal or array of literals) is not an
# injection surface; require interpolation (#{}) or a variable/identifier
# argument. The hint matches an identifier in arg position but not inside a
# quoted literal (#97).
[[sink]]
id = "rb.command-exec.kernel"
category = "command_exec"
severity = "high"
callee = "rb:{system,exec,spawn}"
require_arg_hint = "\\#\\{|(?:^|[(,])\\s*[\\[*&]?\\s*[a-zA-Z_@$]"
description = "Kernel command execution with a dynamic argument"

[[sink]]
id = "rb.command-exec.process"
category = "command_exec"
severity = "high"
callee = "rb:{fork,syscall}"
description = "Process spawn / raw syscall"

[[sink]]
id = "rb.command-exec.attr"
category = "command_exec"
severity = "high"
callee = "rb:*.{system,exec,spawn}"
require_arg_hint = "\\#\\{|(?:^|[(,])\\s*[\\[*&]?\\s*[a-zA-Z_@$]"
description = "Command execution on a receiver (Open3, Process, etc.)"

[[sink]]
id = "rb.code-eval"
category = "code_eval"
severity = "critical"
callee = "rb:{eval,instance_eval,class_eval,module_eval,define_method}"
description = "Dynamic code evaluation"

[[sink]]
id = "rb.code-eval.attr"
category = "code_eval"
severity = "critical"
callee = "rb:*.{eval,instance_eval,class_eval,module_eval}"
description = "Dynamic code evaluation on a receiver"

# Unambiguous ActiveRecord raw-SQL methods — receiver-agnostic, no arg guard.
[[sink]]
id = "rb.sql-query"
category = "sql"
severity = "medium"
callee = "rb:*.{find_by_sql,exec_query,exec_update,exec_delete,select_all,select_one,select_value,select_rows}"
description = "ActiveRecord raw SQL execution"

# Bare .execute is the Rails service-object convention (Service.new(...).execute,
# Interactor, GraphQL schema execution, ...) — almost never SQL. On GitLab the
# unguarded glob produced 13,821 edges, ~99% service objects (#91). Only a sink
# when the argument looks like SQL (keyword or string interpolation); (?i) because
# SinkRegistry.match does not pass re.IGNORECASE.
[[sink]]
id = "rb.sql-execute"
category = "sql"
severity = "medium"
callee = "rb:*.execute"
require_arg_hint = "(?i)\\b(select|insert|update|delete|from|where|drop|truncate|alter|union|sanitize_sql|arel)\\b|\\#\\{"
description = "Raw SQL execute with a SQL-shaped statement"

[[source]]
id = "rb.sinatra.params"
category = "http_input"
callee = "rb:*.params*"
description = "Sinatra/Rails request params"

# --- C5 deepening ---
# NOTE: `X::Y.method` receivers canonicalize to `rb:*.method` when unresolved,
# so receiver-agnostic patterns (with arg hints) are used for stdlib sinks.
[[sink]]
id = "rb.command-exec.open3"
category = "command_exec"
severity = "high"
callee = "rb:*.{capture2,capture2e,capture3,popen2,popen3,popen2e}"
require_arg_hint = "\\#\\{|(?:^|[(,])\\s*[\\[*&]?\\s*[a-zA-Z_@$]"
description = "Open3 command execution with a dynamic argument"

[[sink]]
id = "rb.deserialization"
category = "deserialization"
severity = "high"
callee = "rb:*.{load,restore,unsafe_load,object_load}"
require_arg_hint = "params|\\#\\{|@|\\("
description = "Unsafe deserialization (Marshal/YAML/Oj)"

[[sink]]
id = "rb.code-eval.send"
category = "code_eval"
severity = "high"
callee = "rb:*.{send,public_send,constantize,const_get}"
require_arg_hint = "params|\\#\\{|@"
description = "Dynamic dispatch / constant resolution from input"

[[sink]]
id = "rb.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "rb:*.{read,open,write,binread}"
require_arg_hint = "params|\\#\\{|\\+"
description = "File access with a non-literal path"

[[sink]]
id = "rb.ssrf"
category = "ssrf"
severity = "medium"
callee = "rb:*.{get_response,post_form}"
description = "Net::HTTP outbound request"

[[sink]]
id = "rb.template-injection"
category = "template_injection"
severity = "high"
callee = "rb:*.{new,result}"
require_arg_hint = "\\#\\{"
description = "ERB template built from interpolated input"

[[source]]
id = "rb.env"
category = "env_input"
callee = "rb:*.{fetch}"
require_arg_hint = "ENV"
description = "Environment variable input"

# ---------------- sanitizers ----------------

[[sanitizer]]
id = "rb.sanitize.shellwords"
category = "command_exec"
callee = "rb:*.{shellescape}"
effect = "neutralizes"
description = "Shell argument quoting (Shellwords.escape / String#shellescape)"

[[sanitizer]]
id = "rb.sanitize.html-escape"
category = "template_injection"
callee = "rb:{CGI.escapeHTML,ERB.Util.html_escape,ERB.Util.h,Rack.Utils.escape_html}"
effect = "reduces"
description = "HTML escaping"

[[sanitizer]]
id = "rb.sanitize.sql"
category = "sql"
callee = "rb:*.{sanitize_sql,sanitize_sql_array,sanitize_sql_for_conditions,quote}"
effect = "reduces"
description = "ActiveRecord SQL sanitization"

[[sanitizer]]
id = "rb.sanitize.basename"
category = "path_traversal"
callee = "rb:{File.basename}"
effect = "reduces"
description = "Basename extraction"
