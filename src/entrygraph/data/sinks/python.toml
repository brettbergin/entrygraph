# Built-in Python sink/source catalog.
# Patterns are brace-globs matched against canonical callee qnames:
#   resolved external calls    -> "py:subprocess.run"
#   unresolved attribute calls -> "py:*.execute"
#   unresolved bare calls      -> "py:eval"

[[sink]]
id = "py.command-exec.subprocess"
category = "command_exec"
severity = "high"
callee = "py:subprocess.{run,call,check_call,check_output,Popen,getoutput,getstatusoutput}"
description = "Subprocess execution"

[[sink]]
id = "py.command-exec.os"
category = "command_exec"
severity = "high"
callee = "py:os.{system,popen,execv,execve,execvp,execl,execlp,spawnv,spawnl,startfile}"
description = "OS command execution"

[[sink]]
id = "py.code-eval"
category = "code_eval"
severity = "critical"
callee = "py:{eval,exec,compile,builtins.eval,builtins.exec}"
description = "Dynamic code evaluation"

[[sink]]
id = "py.sql-execute"
category = "sql"
severity = "medium"
callee = "py:*.{execute,executemany,executescript}"
description = "SQL statement execution (receiver-agnostic)"

[[sink]]
id = "py.deserialization.pickle"
category = "deserialization"
severity = "high"
callee = "py:{pickle,cPickle,marshal,shelve}.{load,loads,open}"
description = "Unsafe deserialization"

[[sink]]
id = "py.deserialization.yaml"
category = "deserialization"
severity = "high"
callee = "py:yaml.{load,unsafe_load,full_load}"
description = "Unsafe YAML loading"

[[sink]]
id = "py.template-injection.flask"
category = "template_injection"
severity = "high"
callee = "py:{flask.render_template_string,*.render_template_string}"
description = "Template rendering from a string"

[[sink]]
id = "py.file-write"
category = "file_write"
severity = "low"
callee = "py:{shutil.rmtree,shutil.move,os.remove,os.unlink,os.rmdir,*.write_text,*.write_bytes}"
description = "Filesystem mutation"

[[sink]]
id = "py.network-out"
category = "network_out"
severity = "low"
callee = "py:{requests.{get,post,put,delete,patch,request},urllib.request.urlopen,httpx.{get,post,request}}"
description = "Outbound network request"

# channel-specific accessors first — match_source returns the first hit in
# registration order, so the catch-all must stay last (#87).
[[source]]
id = "py.flask.query"
category = "http_input"
channel = "query"
callee = "py:flask.request.args*"
description = "Flask query-string input"

[[source]]
id = "py.flask.form"
category = "http_input"
channel = "form"
callee = "py:flask.request.form*"
description = "Flask form input"

[[source]]
id = "py.flask.header"
category = "http_input"
channel = "header"
callee = "py:flask.request.headers*"
description = "Flask header input"

[[source]]
id = "py.flask.cookie"
category = "http_input"
channel = "cookie"
callee = "py:flask.request.cookies*"
description = "Flask cookie input"

[[source]]
id = "py.flask.body"
category = "http_input"
channel = "body"
callee = "py:flask.request.{json,get_json,data,get_data,stream,files}*"
description = "Flask request-body input"

[[source]]
id = "py.flask.request"
category = "http_input"
callee = "py:flask.request*"
description = "Flask request input (unspecified channel)"

# FastAPI / Starlette parameter declarators. A typed handler param defaulting to
# `Query(...)`/`Path(...)`/`Body(...)`/... is a demonstrable read of that request
# channel, so the declarator call at the handler seeds an explicit, param-level
# source (stronger than the handler-as-source fallback). fastapi re-exports these
# from starlette, and users import either name.
[[source]]
id = "py.fastapi.query"
category = "http_input"
channel = "query"
callee = "py:{fastapi,starlette.*}.Query"
description = "FastAPI query-parameter declarator"

[[source]]
id = "py.fastapi.path"
category = "http_input"
channel = "path"
callee = "py:{fastapi,starlette.*}.Path"
description = "FastAPI path-parameter declarator"

[[source]]
id = "py.fastapi.header"
category = "http_input"
channel = "header"
callee = "py:{fastapi,starlette.*}.Header"
description = "FastAPI header declarator"

[[source]]
id = "py.fastapi.cookie"
category = "http_input"
channel = "cookie"
callee = "py:{fastapi,starlette.*}.Cookie"
description = "FastAPI cookie declarator"

[[source]]
id = "py.fastapi.form"
category = "http_input"
channel = "form"
callee = "py:{fastapi,starlette.*}.Form"
description = "FastAPI form-field declarator"

[[source]]
id = "py.fastapi.body"
category = "http_input"
channel = "body"
callee = "py:{fastapi,starlette.*}.{Body,File,UploadFile}"
description = "FastAPI request-body / file declarator"

[[source]]
id = "py.stdin"
category = "user_input"
callee = "py:{input,sys.stdin.*}"
description = "Interactive input"

[[sink]]
id = "py.ssrf"
category = "ssrf"
severity = "medium"
callee = "py:{requests.{get,post,put,delete,patch,request},urllib.request.{urlopen,Request},httpx.{get,post,request,stream}}"
require_arg_hint = "\\+|%|format|f['\"]"
description = "Server-side request with a non-literal URL"

[[sink]]
id = "py.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "py:{open,io.open}"
require_arg_hint = "\\+|%|format\\(|f['\"]"
description = "File open with a non-literal path"

[[sink]]
id = "py.xxe"
category = "xxe"
severity = "medium"
callee = "py:{xml.etree.ElementTree.{parse,fromstring},lxml.etree.{parse,fromstring,XML},xml.dom.minidom.{parse,parseString},xml.sax.{parse,parseString}}"
description = "XML parsing susceptible to XXE"

[[sink]]
id = "py.weak-crypto"
category = "weak_crypto"
severity = "low"
callee = "py:hashlib.{md5,sha1}"
description = "Weak hashing algorithm"

[[sink]]
id = "py.deserialization.extra"
category = "deserialization"
severity = "high"
callee = "py:{dill,cloudpickle,joblib}.{load,loads}"
description = "Unsafe deserialization (dill/cloudpickle/joblib)"

[[sink]]
id = "py.template-injection.libs"
category = "template_injection"
severity = "high"
callee = "py:{jinja2.Template,mako.template.Template,django.template.Template}"
description = "Template constructed from a string"

[[sink]]
id = "py.dynamic-import"
category = "code_eval"
severity = "medium"
callee = "py:{importlib.import_module,__import__}"
description = "Dynamic module import"

[[source]]
id = "py.cli-args"
category = "cli_arg"
callee = "py:*.{parse_args,parse_known_args}"
description = "argparse parsed-argument access"

[[source]]
id = "py.env"
category = "env_input"
callee = "py:{os.getenv,os.environ.get}"
description = "Environment variable input"
