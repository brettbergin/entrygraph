# Built-in Java sink/source catalog.
# Patterns are brace-globs matched against canonical callee qnames:
#   resolved external calls    -> "java:com.example.Foo.bar"
#   unresolved attribute calls -> "java:*.exec"     (unknown receiver)
#   unresolved bare calls      -> "java:doThing"
#
# Runtime.getRuntime().exec(...) and new ProcessBuilder(...).start() both have
# unknown receivers, so they land on "java:*.exec" / "java:*.start"-style
# guesses; the receiver-agnostic patterns below catch them.

[[sink]]
id = "java.command-exec"
category = "command_exec"
severity = "high"
callee = "java:{*.exec,Runtime.exec,ProcessBuilder,*.ProcessBuilder}"
description = "OS command execution (Runtime.exec / ProcessBuilder)"

# Unambiguous JDBC statement methods — receiver-agnostic, no arg guard.
[[sink]]
id = "java.sql-query"
category = "sql"
severity = "medium"
callee = "java:*.{executeQuery,executeUpdate,executeLargeUpdate,executeBatch}"
description = "JDBC statement execution"

# Bare .execute is heavily overloaded (Executor.execute(runnable), HttpClient
# .execute(request), command patterns) — same shape as rb.sql-execute (#91/#97).
# Only a sink when the argument looks like SQL.
[[sink]]
id = "java.sql-execute"
category = "sql"
severity = "medium"
callee = "java:*.execute"
require_arg_hint = "(?i)\\b(select|insert|update|delete|from|where|drop|truncate|alter|union|sql)\\b|\\+"
description = "Raw SQL execute with a SQL-shaped statement"

[[sink]]
id = "java.deserialization"
category = "deserialization"
severity = "high"
callee = "java:*.readObject"
description = "Unsafe Java deserialization (ObjectInputStream.readObject)"

[[sink]]
id = "java.code-eval"
category = "code_eval"
severity = "critical"
callee = "java:*.eval"
description = "Dynamic code evaluation (ScriptEngine.eval)"

# --- C5 deepening ---
[[sink]]
id = "java.ssrf"
category = "ssrf"
severity = "medium"
callee = "java:*.{openConnection,openStream}"
description = "Outbound connection (URL.openConnection / openStream)"

[[sink]]
id = "java.xxe"
category = "xxe"
severity = "medium"
callee = "java:*.{newDocumentBuilder,newSAXParser,newXMLReader,createXMLStreamReader}"
description = "XML parser factory susceptible to XXE"

[[sink]]
id = "java.deserialization.extra"
category = "deserialization"
severity = "high"
callee = "java:{XMLDecoder,*.XMLDecoder,*.readUnshared,*.enableDefaultTyping}"
description = "Unsafe deserialization (XMLDecoder / Jackson default typing)"

# `.lookup` collides with the ubiquitous no-arg MethodHandles.lookup() (#97);
# a JNDI lookup always names a target, so require a non-empty argument list.
[[sink]]
id = "java.jndi"
category = "jndi"
severity = "medium"
callee = "java:*.lookup"
require_arg_hint = "[^()\\s]"
description = "JNDI lookup (InitialContext.lookup)"

[[sink]]
id = "java.expression-injection"
category = "template_injection"
severity = "high"
callee = "java:*.{parseExpression,createTemplate}"
description = "Expression/template parsing (SpEL / Velocity / Freemarker)"

# Bare .evaluate collides with JUnit Statement.evaluate() (no-arg) and countless
# visitor/evaluator patterns (#97); require a non-empty argument list.
[[sink]]
id = "java.expression-injection.evaluate"
category = "template_injection"
severity = "high"
callee = "java:*.evaluate"
require_arg_hint = "[^()\\s]"
description = "Expression evaluation with an argument (SpEL / XPath / EL)"

[[sink]]
id = "java.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "java:{FileInputStream,*.FileInputStream,FileReader,*.FileReader,Files.readAllBytes,*.Files.readAllBytes,Paths.get}"
description = "File access with a potentially attacker-controlled path"

# split by channel so findings can say which request surface feeds a sink (#87)
[[source]]
id = "java.servlet.query"
category = "http_input"
channel = "query"
callee = "java:*.{getParameter,getParameterValues,getQueryString}"
description = "Servlet query/form parameter input"

[[source]]
id = "java.servlet.header"
category = "http_input"
channel = "header"
callee = "java:*.{getHeader,getHeaders}"
description = "Servlet header input"

[[source]]
id = "java.servlet.cookie"
category = "http_input"
channel = "cookie"
callee = "java:*.getCookies"
description = "Servlet cookie input"

[[source]]
id = "java.servlet.body"
category = "http_input"
channel = "body"
callee = "java:*.{getInputStream,getReader}"
description = "Servlet request-body input"

[[source]]
id = "java.env"
category = "env_input"
callee = "java:System.getenv"
description = "Environment variable input"

# ---------------- sanitizers ----------------

[[sanitizer]]
id = "java.sanitize.html-encode"
category = "template_injection"
callee = "java:*.{forHtml,forHtmlContent,forJavaScript,escapeHtml4,escapeHtml,escapeXml11,htmlEscape}"
effect = "reduces"
description = "OWASP Encoder / commons-text / Spring HTML escaping"

[[sanitizer]]
id = "java.sanitize.path-normalize"
category = "path_traversal"
callee = "java:*.{getFileName,normalize,getName}"
effect = "reduces"
description = "Path normalization / filename extraction (Path.getFileName, FilenameUtils.getName)"

[[sanitizer]]
id = "java.sanitize.url-encode"
category = "ssrf"
callee = "java:*.{urlEncode,encode}"
effect = "reduces"
description = "URL encoding (URLEncoder.encode)"
