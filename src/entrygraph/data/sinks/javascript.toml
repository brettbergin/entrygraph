# Built-in JavaScript / TypeScript sink catalog.
# Canonical callees: import-expanded externals like "js:child_process.exec",
# unresolved attribute calls like "js:*.query", bare calls like "js:eval".

[[sink]]
id = "js.command-exec.child_process"
category = "command_exec"
severity = "high"
callee = "js:child_process.{exec,execSync,spawn,spawnSync,execFile,execFileSync}"
description = "Child process execution"

[[sink]]
id = "js.command-exec.member"
category = "command_exec"
severity = "high"
# `exec` is deliberately excluded from this unknown-receiver wildcard: it collides
# with RegExp.prototype.exec (a very common false positive), and real child_process
# exec — destructured `const {exec}` or aliased `cp.exec` — resolves to
# js:child_process.exec via the import map and is caught by the specific sink above.
# execSync/spawn/spawnSync have no built-in method collision, so they stay.
callee = "js:*.{execSync,spawn,spawnSync}"
description = "Child process execution (member call)"

[[sink]]
id = "js.code-eval"
category = "code_eval"
severity = "critical"
callee = "js:{eval,Function}"
description = "Dynamic code evaluation"

[[sink]]
id = "js.sql-query"
category = "sql"
severity = "medium"
callee = "js:*.{query,execute,raw}"
# Receiver-agnostic `.query`/`.execute` collide with non-SQL APIs (DOM/tRPC/nock
# `.query`, `URL.query`). Require the argument to show string concatenation or
# template interpolation — the actual SQL-injection signal — mirroring the knex/
# sequelize lib patterns. A constant or parameterized query is not flagged.
require_arg_hint = "\\+|\\$\\{|`"
description = "SQL query execution (receiver-agnostic, dynamic-arg)"

[[sink]]
id = "js.file-write"
category = "file_write"
severity = "low"
callee = "js:{fs.writeFile,fs.writeFileSync,fs.appendFile,fs.rm,fs.rmSync,fs.unlink}"
description = "Filesystem mutation"

[[sink]]
id = "js.network-out"
category = "network_out"
severity = "low"
callee = "js:{fetch,axios.get,axios.post,http.get,https.get}"
description = "Outbound network request"

[[source]]
id = "js.cli-args"
category = "cli_arg"
callee = "js:*.{opts,parseSync}"
description = "commander/yargs parsed-argument access"

# split by channel (#87); these match call-form access — property reads are
# covered by handler-as-source (F-H9).
[[source]]
id = "js.express.body"
category = "http_input"
channel = "body"
callee = "js:*.body"
description = "Express request body"

[[source]]
id = "js.express.query"
category = "http_input"
channel = "query"
callee = "js:*.query"
description = "Express query string"

[[source]]
id = "js.express.params"
category = "http_input"
channel = "path"
callee = "js:*.params"
description = "Express route params"

[[source]]
id = "js.express.header"
category = "http_input"
channel = "header"
callee = "js:*.headers"
description = "Express/Koa/Fastify request headers"

[[source]]
id = "js.express.cookie"
category = "http_input"
channel = "cookie"
callee = "js:*.cookies"
description = "Express/Koa request cookies"

# --- sanitizers (S3): neutralize/reduce taint for a sink category ---
[[sanitizer]]
id = "js.sanitize.sqlstring"
category = "sql"
callee = "js:{sqlstring.escape,mysql.escape,*.escapeId,*.escape}"
effect = "reduces"
description = "SQL string escaping"

[[sanitizer]]
id = "js.sanitize.shellescape"
category = "command_exec"
callee = "js:{shell-quote.quote,shellescape}"
effect = "neutralizes"
description = "Shell argument quoting"

[[sanitizer]]
id = "js.sanitize.html-escape"
category = "template_injection"
callee = "js:{escape-html,he.encode,*.escapeHtml}"
effect = "reduces"
description = "HTML entity escaping"

# --- C5 deepening ---
[[sink]]
id = "js.ssrf"
category = "ssrf"
severity = "medium"
callee = "js:{axios.{request,put,delete,patch},got,http.request,https.request,undici.{request,fetch}}"
require_arg_hint = "\\+|\\$\\{|`"
description = "Server-side request with a non-literal URL"

[[sink]]
id = "js.path-traversal"
category = "path_traversal"
severity = "medium"
callee = "js:fs.{readFile,readFileSync,createReadStream,open,openSync}"
require_arg_hint = "\\+|\\$\\{|`"
description = "File read with a non-literal path"

[[sink]]
id = "js.template-injection"
category = "template_injection"
severity = "high"
callee = "js:{ejs.render,handlebars.compile,pug.render,nunjucks.renderString,lodash.template}"
description = "Template rendering / compilation"

[[sink]]
id = "js.code-eval.vm"
category = "code_eval"
severity = "critical"
callee = "js:vm.{runInNewContext,runInThisContext,runInContext}"
description = "Node vm dynamic code execution"

[[sink]]
id = "js.weak-crypto"
category = "weak_crypto"
severity = "low"
callee = "js:crypto.createHash"
require_arg_hint = "md5|sha1"
description = "Weak hashing algorithm"
