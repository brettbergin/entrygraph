"""The root query type."""
type Query {
  "Look up a user by id."
  user(id: ID!): User
  posts(limit: Int): [Post!]!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
}

extend type Query {
  search(term: String!): [Post!]!
}

type User {
  id: ID!
  name: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  author: User!
}

input CreateUserInput {
  name: String!
}
